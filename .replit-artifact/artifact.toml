kind = "web"
previewPath = "/"
title = "Koroda Furniture"
version = "1.0.0"
id = "artifacts/koroda-furniture"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25433

[services.development]
run = "pnpm --filter @workspace/koroda-furniture run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/koroda-furniture", "run", "build" ]
publicDir = "artifacts/koroda-furniture/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25433"
BASE_PATH = "/"
